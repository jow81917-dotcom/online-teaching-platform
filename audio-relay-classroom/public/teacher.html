<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Teacher — DrawCall Classroom</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       DRAWCALL STYLES + TEACHER CLASSROOM INTEGRATION
       ============================================================ */
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --btn-size: 58px;
      --blob-size: 48px;
      --top-margin: 32px;
      --mic-idle: #c68642;
      --mic-requesting: #16c24a;
      --mic-granted: #16c24a;
      --sidebar-width: 280px;
    }

    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* ── PHONE SHELL ── */
    #phone {
      position: relative;
      width: 100%;
      max-width: 390px;
      height: 100vh;
      max-height: 844px;
      background: var(--bg);
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0,0,0,0.9);
    }

    /* ── BACKGROUND IMAGE CONTAINER ── */
    #image-container {
      position: absolute;
      left: 2px;
      right: 2px;
      top: var(--top-margin);
      bottom: 0;
      width: calc(100% - 4px);
      height: calc(100% - var(--top-margin));
      z-index: 1;
      display: none;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #000;
    }

    #bg-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    /* ── DRAWING CANVAS ── */
    #draw-canvas {
      position: absolute;
      left: 2px;
      right: 2px;
      top: var(--top-margin);
      bottom: 0;
      width: calc(100% - 4px);
      height: calc(100% - var(--top-margin));
      z-index: 2;
      touch-action: none;
      cursor: default;
    }

    #draw-canvas.pen-active { cursor: crosshair; }

    /* ── PLACEHOLDER ── */
    #placeholder {
      position: absolute;
      inset: 0;
      top: var(--top-margin);
      z-index: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      height: calc(100% - var(--top-margin));
    }

    #placeholder .icon { font-size: 52px; opacity: 0.1; }
    #placeholder p {
      font-size: 13px;
      color: rgba(255,255,255,0.13);
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════
       TOP BLOB BUTTONS
    ══════════════════════════════════════ */
    .blob {
      position: absolute;
      top: calc(var(--top-margin) + 8px);
      z-index: 10;
      width: var(--blob-size);
      height: var(--blob-size);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, filter 0.15s ease;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,0.55));
    }

    .blob:active { transform: scale(0.86); }

    #blob-color {
      left: 16px;
      border-radius: 50% 50% 30% 50% / 50% 50% 50% 30%;
      background: #ffffff;
    }

    #blob-file {
      right: 16px;
      background: #ff2d78;
      border-radius: 50% 30% 50% 50% / 30% 50% 50% 50%;
      font-size: 20px;
    }

    #blob-color-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #ffffff;
      border: 2.5px solid rgba(0,0,0,0.2);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
      transition: background 0.2s;
      pointer-events: none;
    }

    /* ── COLOR PICKER POPUP ── */
    #color-popup {
      position: absolute;
      top: calc(var(--top-margin) + 68px);
      left: 12px;
      z-index: 20;
      background: rgba(16,16,16,0.97);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 14px;
      width: 240px;
      backdrop-filter: blur(24px);
      display: none;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.8);
    }

    #color-popup.open { display: flex; }

    .cp-label {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
    }

    #swatch-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
    }

    .swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .swatch:active { transform: scale(0.8); }
    .swatch.selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 0 10px rgba(255,255,255,0.2);
      transform: scale(1.18);
    }

    #hex-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #hex-preview-box {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #hex-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 7px 10px;
      font-family: 'Outfit', monospace;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      outline: none;
    }

    #hex-input:focus {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
    }

    #hex-input.invalid { border-color: #e5202e; color: #ff6b6b; }

    #size-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    #size-dot-preview {
      border-radius: 50%;
      background: #fff;
      flex-shrink: 0;
      transition: width 0.1s, height 0.1s, background 0.2s;
    }

    #pen-size-val {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      font-weight: 600;
    }

    #size-track-wrap {
      position: relative;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
    }

    #size-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      border-radius: 999px;
      background: #fff;
      pointer-events: none;
      transition: width 0.08s;
    }

    #slider-size {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    /* ══════════════════════════════════════
       STATUS PILLS
    ══════════════════════════════════════ */
    #status-bar {
      position: absolute;
      top: calc(var(--top-margin) + 68px);
      right: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }

    .status-pill {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      opacity: 0;
      transform: translateX(8px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .status-pill.show { opacity: 1; transform: translateX(0); }

    #pill-pen {
      background: rgba(37,99,255,0.2);
      border: 1px solid rgba(37,99,255,0.5);
      color: #6096ff;
    }

    #pill-mic {
      background: rgba(22,194,74,0.15);
      border: 1px solid rgba(22,194,74,0.4);
      color: #16c24a;
    }

    /* ══════════════════════════════════════
       BOTTOM CONTROL BUTTONS
    ══════════════════════════════════════ */
    #bottom-bar {
      position: absolute;
      bottom: 32px;
      left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
    }

    .ctrl-btn {
      width: var(--btn-size);
      height: var(--btn-size);
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.25s ease,
                  background-color 0.4s ease, filter 0.25s ease;
      position: relative;
      outline: none;
      flex-shrink: 0;
    }

    .ctrl-btn:active { transform: scale(0.87); }

    /* Pen Button */
    #btn-pen {
      background: #2563ff;
      box-shadow: 0 4px 20px rgba(37,99,255,0.45);
    }

    #btn-pen.active {
      box-shadow: 0 0 0 3px rgba(37,99,255,0.4), 0 4px 24px rgba(37,99,255,0.8);
      filter: brightness(1.2);
    }

    #btn-pen.active::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid rgba(37,99,255,0.55);
      animation: pulse-ring 1.4s ease-out infinite;
    }

    /* Hand Button (replaces mic button) */
    #btn-hand {
      background: var(--mic-idle);
      box-shadow: 0 4px 20px rgba(198,132,66,0.4);
      transition: background-color 0.5s ease, box-shadow 0.4s ease;
    }

    #btn-hand.has-pending {
      background: var(--mic-requesting);
      box-shadow: 0 4px 20px rgba(22,194,74,0.4);
    }

    #btn-hand.speaking {
      background: var(--mic-granted);
      box-shadow: 0 0 0 3px rgba(22,194,74,0.4), 0 4px 24px rgba(22,194,74,0.8);
      filter: brightness(1.15);
    }

    #btn-hand.speaking::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid rgba(22,194,74,0.55);
      animation: pulse-ring 1.4s ease-out infinite;
    }

    /* Call Button */
    #btn-call {
      background: #c0392b;
      box-shadow: 0 4px 20px rgba(192,57,43,0.35);
      opacity: 0.65;
      transition: background-color 0.3s, box-shadow 0.3s, opacity 0.3s;
    }

    #btn-call.in-call {
      background: #e5202e;
      box-shadow: 0 0 0 3px rgba(229,32,46,0.4), 0 4px 28px rgba(229,32,46,0.85);
      opacity: 1;
      animation: call-shake 2.8s ease-in-out infinite;
    }

    #btn-clear {
      position: absolute;
      bottom: 105px; right: 16px;
      z-index: 10;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.11);
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      font-family: 'Outfit', sans-serif;
      display: none;
    }

    #btn-clear:hover { background: rgba(255,255,255,0.13); color: #fff; }

    /* ══════════════════════════════════════
       STUDENT SIDEBAR (swipe from left)
    ══════════════════════════════════════ */
    .student-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100%;
      background: rgba(20, 20, 25, 0.98);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.1);
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      flex-direction: column;
      font-family: 'Outfit', sans-serif;
    }

    .student-sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h3 {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
    }

    .sidebar-header span {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }

    .close-sidebar {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .close-sidebar:hover {
      background: rgba(255,255,255,0.1);
    }

    .students-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .student-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      transition: background 0.2s;
    }

    .student-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .student-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .student-status.online { background: #34c759; box-shadow: 0 0 6px #34c759; }
    .student-status.hand-raised { background: #ffcc00; box-shadow: 0 0 6px #ffcc00; }
    .student-status.speaking { background: #16c24a; box-shadow: 0 0 8px #16c24a; animation: pulse-glow 1s infinite; }
    .student-status.idle { background: #6c6c6c; }

    .student-name {
      color: #fff;
      font-size: 14px;
      font-weight: 500;
    }

    .student-hand-icon {
      font-size: 16px;
    }

    .teacher-badge {
      background: rgba(37,99,255,0.2);
      border: 1px solid rgba(37,99,255,0.3);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 10px;
      color: #6096ff;
    }

    /* ══════════════════════════════════════
       PENDING REQUESTS POPUP
    ══════════════════════════════════════ */
    .pending-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      width: 300px;
      background: rgba(24, 24, 28, 0.98);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      z-index: 60;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .pending-popup.open {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .pending-popup-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pending-popup-header h4 {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }

    .close-popup {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 20px;
      cursor: pointer;
    }

    .pending-queue-list {
      padding: 16px;
      max-height: 300px;
      overflow-y: auto;
    }

    .pending-queue-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }

    .auto-approve-note {
      padding: 12px 16px;
      background: rgba(22,194,74,0.1);
      border-top: 1px solid rgba(22,194,74,0.2);
      font-size: 11px;
      color: #16c24a;
      text-align: center;
    }

    /* Toast Notification */
    #toast {
      position: absolute;
      top: calc(var(--top-margin) + 70px);
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      z-index: 40;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #file-input { display: none; }

    /* Keyframe Animations */
    @keyframes pulse-ring {
      0%   { transform: scale(1);    opacity: 0.7; }
      100% { transform: scale(1.45); opacity: 0; }
    }

    @keyframes call-shake {
      0%,100% { transform: rotate(0deg); }
      8%   { transform: rotate(-9deg); }
      16%  { transform: rotate(9deg); }
      24%  { transform: rotate(-5deg); }
      32%  { transform: rotate(5deg); }
      40%,90% { transform: rotate(0deg); }
    }

    @keyframes pulse-glow {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    /* Touch zone for swipe detection */
    .swipe-zone {
      position: absolute;
      left: 0;
      top: 0;
      width: 15px;
      height: 100%;
      z-index: 45;
      pointer-events: auto;
    }

    /* Overlay when sidebar is open */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 49;
      display: none;
    }

    .sidebar-overlay.show {
      display: block;
    }
  </style>
</head>
<body>

<div id="phone">
  <div class="swipe-zone" id="swipeZone"></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Student Sidebar -->
  <div class="student-sidebar" id="studentSidebar">
    <div class="sidebar-header">
      <h3>Students</h3>
      <span id="studentCount">0</span>
      <button class="close-sidebar" id="closeSidebar">✕</button>
    </div>
    <div class="students-list" id="studentsList">
      <div style="text-align:center; color:rgba(255,255,255,0.3); padding:40px;">No students connected</div>
    </div>
  </div>

  <!-- Pending Requests Popup -->
  <div class="pending-popup" id="pendingPopup">
    <div class="pending-popup-header">
      <h4>🙋 Pending Requests</h4>
      <button class="close-popup" id="closePopup">✕</button>
    </div>
    <div class="pending-queue-list" id="pendingQueueList">
      <div style="text-align:center; color:rgba(255,255,255,0.3); padding:20px;">No pending requests</div>
    </div>
    <div class="auto-approve-note">
      ⚡ Clicking the hand button will auto-approve the first student in queue
    </div>
  </div>

  <!-- Placeholder -->
  <div id="placeholder">
    <div class="icon">🖼️</div>
    <p>Tap the pink button to share material</p>
  </div>

  <!-- Background Image Container -->
  <div id="image-container">
    <img id="bg-image" alt="background"/>
  </div>

  <!-- Drawing Canvas -->
  <canvas id="draw-canvas"></canvas>

  <!-- Top Blobs -->
  <div class="blob" id="blob-color">
    <div id="blob-color-dot"></div>
  </div>
  <div class="blob" id="blob-file">📎</div>

  <!-- Color Popup -->
  <div id="color-popup">
    <div class="cp-label">Colors</div>
    <div id="swatch-grid"></div>
    <div class="cp-label">Custom Hex</div>
    <div id="hex-row">
      <div id="hex-preview-box"></div>
      <input id="hex-input" type="text" maxlength="7" placeholder="#FFFFFF" value="#FFFFFF" spellcheck="false" autocomplete="off"/>
    </div>
    <div class="cp-label">Pen Size</div>
    <div id="size-label-row">
      <div id="size-dot-preview" style="width:8px;height:8px;"></div>
      <span id="pen-size-val">4px</span>
    </div>
    <div id="size-track-wrap">
      <div id="size-fill" style="width:10%"></div>
      <input type="range" id="slider-size" min="1" max="30" value="4"/>
    </div>
  </div>

  <!-- Status Pills -->
  <div id="status-bar">
    <div class="status-pill" id="pill-pen">✏️ Drawing</div>
    <div class="status-pill" id="pill-mic">🎙️ Mic On</div>
    <div class="status-pill" id="pill-speaking">🎤 Student Speaking</div>
  </div>

  <!-- Clear Canvas Button -->
  <button id="btn-clear">Clear</button>

  <!-- Bottom Control Bar -->
  <div id="bottom-bar">
    <button class="ctrl-btn" id="btn-pen" title="Toggle drawing mode">✏️</button>
    <button class="ctrl-btn" id="btn-hand" title="Hand requests">🖐️</button>
    <button class="ctrl-btn" id="btn-call" title="Start/End Call">📞</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Hidden File Input -->
  <input type="file" id="file-input" accept="image/*"/>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="teacher.js"></script>
</body>
</html>
