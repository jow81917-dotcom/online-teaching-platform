<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>DrawCall</title>

<!--
  ============================================================
  DRAWCALL APP — UI COMPONENT
  ============================================================
  This is a phone-sized (max 390×844px) single-file web app.
  It is designed to be embedded inside a larger WebRTC system.

  BUTTON OVERVIEW FOR AI AGENTS:
  ─────────────────────────────────────────────────────────
  1. YELLOW BLOB (top-left)  → Color picker popup
     - Shows a grid of 35 hex color swatches
     - Custom hex input field for any color
     - Pen size slider
     - Selected color is applied to the canvas pen

  2. PINK BLOB (top-right)  → File/Image picker
     - Opens device image picker
     - Uploaded image fills the screen with 2px margin on left and right
     - Canvas drawing layer clears on new image upload

  3. BLUE BUTTON (bottom-left) — PEN TOGGLE
     - Toggles draw mode ON/OFF on the canvas
     - When active: glows blue, shows "Drawing" status pill
     - Supports both mouse and touch (finger) drawing
     - Draws on top of the background image

  4. BROWN→GREEN BUTTON (bottom-center) — MIC PERMISSION INDICATOR
     - Default color: brown/skin-tone (#c68642) = idle, no remote user
     - Turns GREEN (#16c24a) when the remote peer REQUESTS mic access
       → Hook: call `setRemoteMicRequesting(true)` from your WebRTC layer
     - GLOWS (pulse animation) when the remote peer has GRANTED mic
       → Hook: call `setRemoteMicGranted(true)` from your WebRTC layer
     - When the LOCAL USER clicks it: requests their own mic permission
       via navigator.mediaDevices.getUserMedia({ audio: true })
     - This button does NOT initiate or end any call by itself

  5. RED BUTTON (bottom-right) — END CALL
     - This button ENDS the active WebRTC call
     - It does NOT start a call (call initiation is handled externally)
     - When clicked: triggers endCall() which:
         a) Stops all local media tracks
         b) Closes the RTCPeerConnection (if set via setPeerConnection())
         c) Resets the mic indicator button back to brown
         d) Hides the call-active overlay
         e) Fires the onCallEnded() callback for your signaling layer
     - While in a call: button pulses/shakes to indicate active call
     - Set the call as active externally via: setCallActive(true)

  WEBRTC INTEGRATION HOOKS (call these from your signaling code):
  ─────────────────────────────────────────────────────────
    setCallActive(true/false)        → shows/hides call state on red button
    setRemoteMicRequesting(true)     → turns hand button green
    setRemoteMicGranted(true)        → makes hand button glow
    setPeerConnection(pc)            → registers RTCPeerConnection for cleanup
    onCallEnded = function() { ... } → fires when red button ends call

  ============================================================
-->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --btn-size: 58px;
    --blob-size: 48px;
    /* MIC BUTTON STATES */
    --mic-idle:       #c68642;   /* brown = no remote user yet         */
    --mic-requesting: #16c24a;   /* green = remote user asking to talk */
    --mic-granted:    #16c24a;   /* green + glow = remote mic allowed  */
    /* NEW: Top margin variable for consistent spacing */
    --top-margin: 32px;
  }

  html, body {
    width: 100%; height: 100%;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }

  /* ── PHONE SHELL ── */
  #phone {
    position: relative;
    width: 100%;
    max-width: 390px;
    height: 100vh;
    max-height: 844px;
    background: var(--bg);
    overflow: hidden;
    box-shadow: 0 0 80px rgba(0,0,0,0.9);
  }

  /* ── BACKGROUND IMAGE CONTAINER (2px margin on left and right, plus top margin) ── */
  #image-container {
    position: absolute;
    left: 2px;
    right: 2px;
    top: var(--top-margin);
    bottom: 0;
    width: calc(100% - 4px);
    height: calc(100% - var(--top-margin));
    z-index: 1;
    display: none;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: #000;
  }

  #bg-image {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* ── DRAWING CANVAS (sits on top of image, same margins: 2px left/right + top margin) ── */
  #draw-canvas {
    position: absolute;
    left: 2px;
    right: 2px;
    top: var(--top-margin);
    bottom: 0;
    width: calc(100% - 4px);
    height: calc(100% - var(--top-margin));
    z-index: 2;
    touch-action: none;   /* prevents scroll while drawing on mobile */
    cursor: default;
  }

  #draw-canvas.pen-active { cursor: crosshair; }

  /* ── PLACEHOLDER (shown before any image is uploaded, now respects top margin) ── */
  #placeholder {
    position: absolute;
    inset: 0;
    top: var(--top-margin);
    z-index: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    pointer-events: none;
    height: calc(100% - var(--top-margin));
  }

  #placeholder .icon { font-size: 52px; opacity: 0.1; }

  #placeholder p {
    font-size: 13px;
    color: rgba(255,255,255,0.13);
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ══════════════════════════════════════
     TOP BLOB BUTTONS (adjusted for top margin)
     Left  = color picker  (yellow/dynamic)
     Right = file picker   (pink)
  ══════════════════════════════════════ */
  .blob {
    position: absolute;
    top: calc(var(--top-margin) + 8px);
    z-index: 10;
    width: var(--blob-size);
    height: var(--blob-size);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease, filter 0.15s ease;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,0.55));
  }

  .blob:active { transform: scale(0.86); }

  /* Color picker blob — bg changes to match selected pen color */
  #blob-color {
    left: 16px;
    border-radius: 50% 50% 30% 50% / 50% 50% 50% 30%;
    background: #ffffff;
  }

  /* File picker blob — always pink */
  #blob-file {
    right: 16px;
    background: #ff2d78;
    border-radius: 50% 30% 50% 50% / 30% 50% 50% 50%;
    font-size: 20px;
  }

  /* Inner dot that shows current pen color */
  #blob-color-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #ffffff;
    border: 2.5px solid rgba(0,0,0,0.2);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
    transition: background 0.2s;
    pointer-events: none;
  }

  /* ══════════════════════════════════════
     COLOR PICKER POPUP (adjusted for top margin)
     Opens below the color blob on click
  ══════════════════════════════════════ */
  #color-popup {
    position: absolute;
    top: calc(var(--top-margin) + 68px);
    left: 12px;
    z-index: 20;
    background: rgba(16,16,16,0.97);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 14px;
    width: 240px;
    backdrop-filter: blur(24px);
    display: none;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.8);
  }

  #color-popup.open { display: flex; }

  .cp-label {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
  }

  /* ── SWATCH GRID: 7 columns × 5 rows of hex color circles ── */
  #swatch-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 7px;
  }

  .swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
  }

  .swatch:active { transform: scale(0.8); }

  /* Highlight ring on selected swatch */
  .swatch.selected {
    border-color: #fff;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 0 10px rgba(255,255,255,0.2);
    transform: scale(1.18);
  }

  /* ── CUSTOM HEX INPUT ── */
  #hex-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #hex-preview-box {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #ffffff;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
    transition: background 0.15s;
  }

  #hex-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 7px 10px;
    font-family: 'Outfit', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  #hex-input:focus {
    border-color: rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.1);
  }

  #hex-input.invalid { border-color: #e5202e; color: #ff6b6b; }

  /* ── PEN SIZE SLIDER ── */
  #size-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  #size-dot-preview {
    border-radius: 50%;
    background: #fff;
    flex-shrink: 0;
    transition: width 0.1s, height 0.1s, background 0.2s;
  }

  #pen-size-val {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
  }

  #size-track-wrap {
    position: relative;
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
  }

  #size-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    border-radius: 999px;
    background: #fff;
    pointer-events: none;
    transition: width 0.08s;
  }

  #slider-size {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    cursor: pointer;
    margin: 0; padding: 0;
  }

  /* ══════════════════════════════════════
     STATUS PILLS (adjusted for top margin)
     Shown top-right when features are active
  ══════════════════════════════════════ */
  #status-bar {
    position: absolute;
    top: calc(var(--top-margin) + 68px);
    right: 16px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
  }

  .status-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }

  .status-pill.show { opacity: 1; transform: translateX(0); }

  /* "Drawing" pill — blue */
  #pill-pen {
    background: rgba(37,99,255,0.2);
    border: 1px solid rgba(37,99,255,0.5);
    color: #6096ff;
  }

  /* "Mic On" pill — green */
  #pill-mic {
    background: rgba(22,194,74,0.15);
    border: 1px solid rgba(22,194,74,0.4);
    color: #16c24a;
  }

  /* ══════════════════════════════════════
     BOTTOM CONTROL BUTTONS
  ══════════════════════════════════════ */
  #bottom-bar {
    position: absolute;
    bottom: 32px;
    left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 22px;
  }

  .ctrl-btn {
    width: var(--btn-size);
    height: var(--btn-size);
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease, box-shadow 0.25s ease,
                background-color 0.4s ease, filter 0.25s ease;
    position: relative;
    outline: none;
    flex-shrink: 0;
  }

  .ctrl-btn:active { transform: scale(0.87); }

  /* ──────────────────────────────────────
     BLUE PEN BUTTON
     Toggles drawing mode on/off
  ────────────────────────────────────── */
  #btn-pen {
    background: #2563ff;
    box-shadow: 0 4px 20px rgba(37,99,255,0.45);
  }

  #btn-pen.active {
    box-shadow: 0 0 0 3px rgba(37,99,255,0.4), 0 4px 24px rgba(37,99,255,0.8);
    filter: brightness(1.2);
  }

  /* Animated ring when pen is active */
  #btn-pen.active::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 2px solid rgba(37,99,255,0.55);
    animation: pulse-ring 1.4s ease-out infinite;
  }

  /* ──────────────────────────────────────
     HAND / MIC INDICATOR BUTTON
     3 visual states:
       1. IDLE    — brown (#c68642), no remote user
       2. REQUEST — green, remote user requesting permission
       3. GRANTED — green + glow pulse, remote user mic is live
  ────────────────────────────────────── */
  #btn-mic {
    background: var(--mic-idle);     /* default: brown */
    box-shadow: 0 4px 20px rgba(198,132,66,0.4);
    transition: background-color 0.5s ease, box-shadow 0.4s ease;
  }

  /* State 2: remote user is requesting mic permission → goes green */
  #btn-mic.requesting {
    background: var(--mic-requesting);
    box-shadow: 0 4px 20px rgba(22,194,74,0.4);
  }

  /* State 3: remote user has GRANTED mic → green + glow */
  #btn-mic.granted {
    background: var(--mic-granted);
    box-shadow: 0 0 0 3px rgba(22,194,74,0.4), 0 4px 24px rgba(22,194,74,0.8);
    filter: brightness(1.15);
  }

  /* Pulse ring for granted state */
  #btn-mic.granted::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 2px solid rgba(22,194,74,0.55);
    animation: pulse-ring 1.4s ease-out infinite;
  }

  /* ──────────────────────────────────────
     RED END-CALL BUTTON
     - ONLY ends the call, does NOT start it
     - Idle (no call): dim red, normal glow
     - Active (in call): bright red + shake animation
  ────────────────────────────────────── */
  #btn-call {
    background: #c0392b;   /* dimmer red when no call active */
    box-shadow: 0 4px 20px rgba(192,57,43,0.35);
    opacity: 0.65;
    transition: background-color 0.3s, box-shadow 0.3s,
                opacity 0.3s, transform 0.15s;
  }

  /* When a call is active — button lights up fully */
  #btn-call.in-call {
    background: #e5202e;
    box-shadow: 0 0 0 3px rgba(229,32,46,0.4), 0 4px 28px rgba(229,32,46,0.85);
    opacity: 1;
    animation: call-shake 2.8s ease-in-out infinite;
  }

  /* ── CLEAR CANVAS BUTTON (adjusted for top margin) ── */
  #btn-clear {
    position: absolute;
    bottom: 105px; right: 16px;
    z-index: 10;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.11);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.2s;
    font-family: 'Outfit', sans-serif;
    display: none;
  }

  #btn-clear:hover { background: rgba(255,255,255,0.13); color: #fff; }

  /* ══════════════════════════════════════
     CALL ACTIVE OVERLAY (respects top margin)
     Shows on top of everything when call is active.
     Tap it or tap the red button to end the call.
  ══════════════════════════════════════ */
  #call-overlay {
    position: absolute;
    inset: 0;
    top: var(--top-margin);
    z-index: 30;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(12px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    height: calc(100% - var(--top-margin));
  }

  #call-overlay.show { display: flex; }

  #call-overlay .avatar {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2563ff, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    animation: avatar-glow 2s ease-in-out infinite alternate;
  }

  #call-overlay .call-name {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
  }

  .call-status {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #call-timer {
    font-size: 30px;
    font-weight: 300;
    color: #fff;
    letter-spacing: 0.06em;
    font-variant-numeric: tabular-nums;
    display: none;
  }

  /* End call button inside the overlay */
  #overlay-end-btn {
    margin-top: 10px;
    background: #e5202e;
    border: none;
    border-radius: 30px;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 32px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(229,32,46,0.5);
    transition: filter 0.2s, transform 0.15s;
  }

  #overlay-end-btn:active { transform: scale(0.93); filter: brightness(0.9); }

  /* ── TOAST NOTIFICATION ── */
  #toast {
    position: absolute;
    top: calc(var(--top-margin) + 70px);
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    z-index: 40;
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #file-input { display: none; }

  /* ══════════════════════════════════════
     KEYFRAME ANIMATIONS
  ══════════════════════════════════════ */

  /* Expanding ring pulse (pen active, mic granted) */
  @keyframes pulse-ring {
    0%   { transform: scale(1);    opacity: 0.7; }
    100% { transform: scale(1.45); opacity: 0; }
  }

  /* Shake animation for active call red button */
  @keyframes call-shake {
    0%,100% { transform: rotate(0deg); }
    8%   { transform: rotate(-9deg); }
    16%  { transform: rotate(9deg); }
    24%  { transform: rotate(-5deg); }
    32%  { transform: rotate(5deg); }
    40%,90% { transform: rotate(0deg); }
  }

  /* Glow pulse on call overlay avatar */
  @keyframes avatar-glow {
    from { box-shadow: 0 0 30px rgba(37,99,255,0.4); }
    to   { box-shadow: 0 0 70px rgba(37,99,255,0.85); }
  }
</style>
</head>
<body>

<div id="phone">

  <!-- ── PLACEHOLDER (before image upload) ── -->
  <div id="placeholder">
    <div class="icon">🖼️</div>
    <p>Tap the pink button to add a photo</p>
  </div>

  <!-- ── BACKGROUND IMAGE CONTAINER (2px margin left & right, top margin applied) ── -->
  <div id="image-container">
    <img id="bg-image" alt="background"/>
  </div>

  <!-- ── DRAWING CANVAS (on top of image, same 2px margin + top margin) ── -->
  <canvas id="draw-canvas"></canvas>

  <!--
    TOP-LEFT BLOB — Color picker
    Background dynamically matches the selected pen color.
    Click to open/close the color popup.
  -->
  <div class="blob" id="blob-color">
    <div id="blob-color-dot"></div>
  </div>

  <!--
    TOP-RIGHT BLOB — File/image picker
    Always pink. Click opens device image selector.
    Selected image fills the screen background with 2px left/right margin.
  -->
  <div class="blob" id="blob-file">📎</div>

  <!-- ── COLOR PICKER POPUP ── -->
  <div id="color-popup">

    <div class="cp-label">Colors</div>

    <!--
      35 hex color swatches in a 7×5 grid.
      Click any to set pen color instantly.
      Selected swatch gets a white ring.
    -->
    <div id="swatch-grid"></div>

    <div class="cp-label">Custom Hex</div>
    <div id="hex-row">
      <div id="hex-preview-box"></div>
      <input id="hex-input" type="text" maxlength="7"
             placeholder="#FFFFFF" value="#FFFFFF"
             spellcheck="false" autocomplete="off"/>
    </div>

    <div class="cp-label">Pen Size</div>
    <div id="size-label-row">
      <div id="size-dot-preview" style="width:8px;height:8px;"></div>
      <span id="pen-size-val">4px</span>
    </div>
    <div id="size-track-wrap">
      <div id="size-fill" style="width:10%"></div>
      <input type="range" id="slider-size" min="1" max="30" value="4"/>
    </div>

  </div>

  <!-- ── STATUS PILLS (top-right, shown when features active) ── -->
  <div id="status-bar">
    <div class="status-pill" id="pill-pen">✏️ Drawing</div>
    <div class="status-pill" id="pill-mic">🎙️ Mic On</div>
  </div>

  <!-- ── CLEAR CANVAS (appears once drawing starts) ── -->
  <button id="btn-clear">Clear</button>

  <!--
    BOTTOM CONTROL BAR — 3 buttons

    [btn-pen]  = BLUE   = toggle drawing mode
    [btn-mic]  = BROWN→GREEN = remote mic status + local mic request
    [btn-call] = RED    = END active WebRTC call only
  -->
  <div id="bottom-bar">

    <button class="ctrl-btn" id="btn-pen" title="Toggle drawing mode">✏️</button>
    <button class="ctrl-btn" id="btn-mic" title="Mic permission indicator">🖐️</button>
    <button class="ctrl-btn" id="btn-call" title="End call">📞</button>

  </div>

  <!--
    CALL ACTIVE OVERLAY
    Shown when setCallActive(true) is called.
    Displays avatar, status text, and live timer.
    Tap "End Call" button or the red phone button to dismiss.
  -->
  <div id="call-overlay">
    <div class="avatar">👤</div>
    <div class="call-name">DrawCall User</div>
    <div class="call-status" id="call-status-text">Connected</div>
    <div id="call-timer">00:00</div>
    <button id="overlay-end-btn">End Call</button>
  </div>

  <!-- ── TOAST NOTIFICATION ── -->
  <div id="toast"></div>

  <!-- ── HIDDEN FILE INPUT ── -->
  <input type="file" id="file-input" accept="image/*"/>

</div><!-- end #phone -->

<script>
/*
  ============================================================
  JAVASCRIPT — DrawCall UI Logic
  ============================================================
  This section handles all UI interactions.
  For WebRTC integration, use the exported hooks at the bottom.
  ============================================================
*/

// DOM REFERENCES
const imageContainer = document.getElementById('image-container');
const bgImage        = document.getElementById('bg-image');
const canvas         = document.getElementById('draw-canvas');
const ctx            = canvas.getContext('2d');
const placeholder    = document.getElementById('placeholder');

const blobColor      = document.getElementById('blob-color');
const blobFile       = document.getElementById('blob-file');
const colorPopup     = document.getElementById('color-popup');
const colorDot       = document.getElementById('blob-color-dot');

const swatchGrid     = document.getElementById('swatch-grid');
const hexInput       = document.getElementById('hex-input');
const hexPreviewBox  = document.getElementById('hex-preview-box');

const sliderSize     = document.getElementById('slider-size');
const penSizeVal     = document.getElementById('pen-size-val');
const sizeFill       = document.getElementById('size-fill');
const sizeDotPreview = document.getElementById('size-dot-preview');

const btnPen         = document.getElementById('btn-pen');
const btnMic         = document.getElementById('btn-mic');
const btnCall        = document.getElementById('btn-call');
const btnClear       = document.getElementById('btn-clear');

const callOverlay    = document.getElementById('call-overlay');
const callStatusTxt  = document.getElementById('call-status-text');
const callTimerEl    = document.getElementById('call-timer');
const overlayEndBtn  = document.getElementById('overlay-end-btn');

const pillPen        = document.getElementById('pill-pen');
const pillMic        = document.getElementById('pill-mic');
const toast          = document.getElementById('toast');
const fileInput      = document.getElementById('file-input');

// APP STATE
let penActive    = false;
let localMicOn   = false;
let isDrawing    = false;
let lastX = 0, lastY = 0;
let penColor     = '#ffffff';
let penSize      = 4;
let callActive   = false;
let callInterval = null;
let callSeconds  = 0;
let _peerConnection = null;
let onCallEnded = () => {};

// 35 swatches (unchanged)
const SWATCHES = [
  '#ffffff','#e5e5e5','#a3a3a3','#737373','#404040','#1a1a1a','#000000',
  '#ff0000','#ff3b30','#ff6b35','#ff9500','#ffcc00','#ffe566','#fff3b0',
  '#00ff00','#34c759','#00c7be','#007aff','#0a84ff','#5e5ce6','#bf5af2',
  '#ff2d55','#ff375f','#ff6ef7','#ff9ff3','#74b9ff','#a29bfe','#fd79a8',
  '#55efc4','#00b894','#fdcb6e','#e17055','#d63031','#6c5ce7','#2d3436',
];

function buildSwatches() {
  SWATCHES.forEach(hex => {
    const s = document.createElement('div');
    s.className    = 'swatch';
    s.style.background = hex;
    s.dataset.hex  = hex;
    if (hex === penColor) s.classList.add('selected');
    s.addEventListener('click', () => selectSwatch(hex, s));
    swatchGrid.appendChild(s);
  });
}

function selectSwatch(hex, el) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  if (el) el.classList.add('selected');
  penColor = hex;
  hexInput.value = hex.toUpperCase();
  hexInput.classList.remove('invalid');
  applyColorUI(hex);
}

function applyColorUI(hex) {
  colorDot.style.background    = hex;
  hexPreviewBox.style.background = hex;
  blobColor.style.background   = hex;
  sizeDotPreview.style.background = hex;
  const lum = (parseInt(hex.slice(1,3),16)/255 * 0.299) + (parseInt(hex.slice(3,5),16)/255 * 0.587) + (parseInt(hex.slice(5,7),16)/255 * 0.114);
  colorDot.style.borderColor = lum > 0.45 ? 'rgba(0,0,0,0.25)' : 'rgba(255,255,255,0.2)';
  colorDot.style.boxShadow = lum > 0.45 ? '0 0 0 3px rgba(0,0,0,0.1)' : '0 0 0 3px rgba(255,255,255,0.2)';
}

hexInput.addEventListener('input', () => {
  let v = hexInput.value.trim();
  if (!v.startsWith('#')) v = '#' + v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    hexInput.classList.remove('invalid');
    penColor = v.toLowerCase();
    document.querySelectorAll('.swatch').forEach(s => {
      s.classList.toggle('selected', s.dataset.hex.toLowerCase() === penColor);
    });
    applyColorUI(penColor);
  } else {
    hexInput.classList.add('invalid');
  }
});

hexInput.addEventListener('keydown', e => e.stopPropagation());

function updateSize() {
  penSize = parseInt(sliderSize.value);
  penSizeVal.textContent = penSize + 'px';
  const pct = ((penSize - 1) / 29) * 100;
  sizeFill.style.width = pct + '%';
  const dot = Math.max(5, Math.min(penSize, 24));
  sizeDotPreview.style.width  = dot + 'px';
  sizeDotPreview.style.height = dot + 'px';
}

sliderSize.addEventListener('input', updateSize);

blobColor.addEventListener('click', e => {
  e.stopPropagation();
  colorPopup.classList.toggle('open');
});

document.addEventListener('click', e => {
  if (!colorPopup.contains(e.target) && !blobColor.contains(e.target)) {
    colorPopup.classList.remove('open');
  }
});

blobFile.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = function() {
    bgImage.src = img.src;
    imageContainer.style.display = 'flex';
    placeholder.style.display = 'none';
    btnClear.style.display = 'block';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setTimeout(() => resizeCanvas(), 50);
  };
  img.src = URL.createObjectURL(file);
  fileInput.value = '';
});

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  if (canvas.width !== rect.width || canvas.height !== rect.height) {
    const saved = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width = rect.width;
    canvas.height = rect.height;
    if (saved.width > 0 && saved.height > 0) {
      try { ctx.putImageData(saved, 0, 0); } catch(e) {}
    }
  }
}

resizeCanvas();
window.addEventListener('resize', () => setTimeout(resizeCanvas, 100));
window.addEventListener('load', () => setTimeout(resizeCanvas, 100));

btnPen.addEventListener('click', () => {
  penActive = !penActive;
  btnPen.classList.toggle('active', penActive);
  canvas.classList.toggle('pen-active', penActive);
  pillPen.classList.toggle('show', penActive);
});

btnMic.addEventListener('click', async () => {
  if (!localMicOn) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
      localMicOn = true;
      pillMic.classList.add('show');
      showToast('🎙️ Your mic is on', '#16c24a', 'rgba(22,194,74,0.12)', 'rgba(22,194,74,0.35)');
    } catch {
      showToast('❌ Mic access denied', '#ff6b6b', 'rgba(229,32,46,0.12)', 'rgba(229,32,46,0.35)');
    }
  } else {
    localMicOn = false;
    pillMic.classList.remove('show');
    showToast('🔇 Your mic is off', 'rgba(255,255,255,0.5)', 'rgba(255,255,255,0.05)', 'rgba(255,255,255,0.15)');
  }
});

btnCall.addEventListener('click', () => { if (callActive) endCall(); });
overlayEndBtn.addEventListener('click', endCall);

function endCall() {
  callActive = false;
  clearInterval(callInterval);
  callInterval = null;
  if (window._localStream) {
    window._localStream.getTracks().forEach(t => t.stop());
    window._localStream = null;
  }
  if (_peerConnection) {
    try { _peerConnection.close(); } catch(_) {}
    _peerConnection = null;
  }
  btnCall.classList.remove('in-call');
  btnCall.textContent = '📞';
  btnMic.classList.remove('requesting', 'granted');
  btnMic.style.background = 'var(--mic-idle)';
  btnMic.style.boxShadow  = '0 4px 20px rgba(198,132,66,0.4)';
  localMicOn = false;
  pillMic.classList.remove('show');
  callOverlay.classList.remove('show');
  callTimerEl.style.display = 'none';
  onCallEnded();
  showToast('📵 Call ended', 'rgba(255,255,255,0.5)', 'rgba(255,255,255,0.05)', 'rgba(255,255,255,0.12)');
}

btnClear.addEventListener('click', () => ctx.clearRect(0, 0, canvas.width, canvas.height));

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (canvas.width  / rect.width),
    y: (src.clientY - rect.top)  * (canvas.height / rect.height)
  };
}

function startDraw(e) {
  if (!penActive) return;
  isDrawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  ctx.beginPath();
  ctx.arc(lastX, lastY, penSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = penColor;
  ctx.fill();
  e.preventDefault();
}

function draw(e) {
  if (!penActive || !isDrawing) return;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.strokeStyle = penColor;
  ctx.lineWidth = penSize;
  ctx.lineCap = ctx.lineJoin = 'round';
  ctx.stroke();
  lastX = p.x; lastY = p.y;
  e.preventDefault();
}

function stopDraw() { isDrawing = false; }

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', stopDraw);
canvas.addEventListener('touchcancel', stopDraw);

function showToast(msg, color, bg, border) {
  toast.textContent = msg;
  toast.style.color = color;
  toast.style.background = bg;
  toast.style.border = `1px solid ${border}`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2600);
}

window.DrawCall = {
  setCallActive(active) {
    callActive = active;
    if (active) {
      btnCall.classList.add('in-call');
      callOverlay.classList.add('show');
      callStatusTxt.textContent = 'Connected';
      callTimerEl.style.display = 'block';
      callSeconds = 0;
      callInterval = setInterval(() => {
        callSeconds++;
        const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
        const s = String(callSeconds % 60).padStart(2, '0');
        callTimerEl.textContent = `${m}:${s}`;
      }, 1000);
    } else {
      endCall();
    }
  },
  setRemoteMicRequesting(requesting) {
    if (requesting) {
      btnMic.classList.add('requesting');
      btnMic.classList.remove('granted');
    } else {
      btnMic.classList.remove('requesting');
    }
  },
  setRemoteMicGranted(granted) {
    if (granted) {
      btnMic.classList.add('granted');
      btnMic.classList.remove('requesting');
    } else {
      btnMic.classList.remove('granted');
    }
  },
  setPeerConnection(pc) { _peerConnection = pc; },
  set onCallEnded(fn) { onCallEnded = fn; },
  get onCallEnded() { return onCallEnded; },
  setCallerName(name) { document.querySelector('#call-overlay .call-name').textContent = name; },
  setCallStatus(text) { callStatusTxt.textContent = text; }
};

buildSwatches();
applyColorUI(penColor);
updateSize();
setTimeout(resizeCanvas, 100);
</script>
</body>
</html>
